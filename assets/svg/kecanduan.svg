<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none">
  <defs>
    <radialGradient id="k-glow-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e53935" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#e53935" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="k-terminal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#7b1010"/>
    </linearGradient>
    <linearGradient id="k-membrane" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a2020"/>
      <stop offset="100%" stop-color="#4a1010"/>
    </linearGradient>
    <radialGradient id="k-dopamine" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffe0a0"/>
      <stop offset="100%" stop-color="#f6a623"/>
    </radialGradient>
    <radialGradient id="k-receptor-on" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#7fe8c8"/>
      <stop offset="100%" stop-color="#2dd4a0"/>
    </radialGradient>
    <filter id="k-blur-soft"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="k-glow"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <circle cx="160" cy="160" r="145" fill="url(#k-glow-bg)" filter="url(#k-blur-soft)"/>

  <!-- Faint outer ring: the "control loop" losing its edge (represents weakening self-regulation) -->
  <circle cx="160" cy="160" r="128" stroke="#e53935" stroke-width="1" stroke-opacity="0.22" fill="none" stroke-dasharray="2 6"/>

  <!-- === PRESYNAPTIC TERMINAL (left, releasing dopamine) === -->
  <path d="M30 120 C30 90 55 66 92 64 C118 62 138 76 146 100 C152 118 148 138 148 160
           C148 182 152 202 146 220 C138 244 118 258 92 256 C55 254 30 230 30 200 Z"
        fill="url(#k-terminal)" stroke="#4a0808" stroke-width="2"/>
  <!-- Vesicles inside terminal, ready to release -->
  <circle cx="78" cy="108" r="7" fill="url(#k-dopamine)" opacity="0.9"/>
  <circle cx="100" cy="92" r="6" fill="url(#k-dopamine)" opacity="0.85"/>
  <circle cx="70" cy="150" r="6.5" fill="url(#k-dopamine)" opacity="0.9"/>
  <circle cx="102" cy="168" r="6" fill="url(#k-dopamine)" opacity="0.8"/>
  <circle cx="78" cy="200" r="7" fill="url(#k-dopamine)" opacity="0.9"/>
  <circle cx="104" cy="220" r="5.5" fill="url(#k-dopamine)" opacity="0.8"/>
  <text x="88" y="164" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#ffd7d6" opacity="0.55">ZAT ASING</text>

  <!-- === POSTSYNAPTIC MEMBRANE (right) === -->
  <path d="M290 100 C270 90 250 92 236 104 C226 112 224 124 224 160 C224 196 226 208 236 216 C250 228 270 230 290 220"
        fill="none" stroke="url(#k-membrane)" stroke-width="14" stroke-linecap="round"/>

  <!-- Receptors on membrane: some active (teal, larger) still responding, most shrunk/dim (downregulated) -->
  <g filter="url(#k-glow)">
    <circle cx="234" cy="96" r="9" fill="url(#k-receptor-on)"/>
  </g>
  <circle cx="232" cy="122" r="4.5" fill="#5c3030" stroke="#e53935" stroke-width="0.8" stroke-opacity="0.5"/>
  <circle cx="230" cy="146" r="3.5" fill="#4a2020" stroke="#e53935" stroke-width="0.6" stroke-opacity="0.4"/>
  <g filter="url(#k-glow)">
    <circle cx="232" cy="170" r="7" fill="url(#k-receptor-on)" opacity="0.75"/>
  </g>
  <circle cx="231" cy="194" r="3" fill="#4a2020" stroke="#e53935" stroke-width="0.5" stroke-opacity="0.35"/>
  <circle cx="234" cy="216" r="4" fill="#5c3030" stroke="#e53935" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- Downregulation arrows: receptors retreating inward -->
  <path d="M226 134 L216 134" stroke="#e53935" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="2 2"/>
  <path d="M224 158 L214 158" stroke="#e53935" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="2 2"/>
  <path d="M226 202 L216 202" stroke="#e53935" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="2 2"/>

  <!-- === DOPAMINE FLOOD across the synaptic cleft === -->
  <g>
    <circle cx="160" cy="112" r="4.5" fill="url(#k-dopamine)">
      <animateTransform attributeName="transform" type="translate" values="0,0;70,0;78,0" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.95;0.95;0" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="140" r="4" fill="url(#k-dopamine)">
      <animateTransform attributeName="transform" type="translate" values="0,0;80,0;88,0" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.9;0" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="155" cy="168" r="5" fill="url(#k-dopamine)">
      <animateTransform attributeName="transform" type="translate" values="0,0;75,0;82,0" dur="2s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.95;0.95;0" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="148" cy="196" r="4" fill="url(#k-dopamine)">
      <animateTransform attributeName="transform" type="translate" values="0,0;82,0;90,0" dur="1.6s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0.85;0" dur="1.6s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="158" cy="224" r="3.6" fill="url(#k-dopamine)">
      <animateTransform attributeName="transform" type="translate" values="0,0;72,0;78,0" dur="1.9s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.9;0" dur="1.9s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Saturation glow in the cleft (overflow) -->
  <ellipse cx="188" cy="160" rx="34" ry="66" fill="#f6a623" opacity="0.14" filter="url(#k-blur-soft)">
    <animate attributeName="opacity" values="0.10;0.22;0.10" dur="2.6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Excess dopamine pooling / not reabsorbed -->
  <circle cx="196" cy="130" r="2.4" fill="#ffd080" opacity="0.7"/>
  <circle cx="204" cy="150" r="2" fill="#ffd080" opacity="0.6"/>
  <circle cx="198" cy="176" r="2.4" fill="#ffd080" opacity="0.65"/>
  <circle cx="206" cy="200" r="2" fill="#ffd080" opacity="0.55"/>
  <circle cx="192" cy="212" r="1.8" fill="#ffd080" opacity="0.5"/>
</svg>
