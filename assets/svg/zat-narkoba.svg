<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none">
  <defs>
    <radialGradient id="z-glow-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e53935" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#e53935" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="z-capsule-a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6a623"/>
      <stop offset="100%" stop-color="#a86a10"/>
    </linearGradient>
    <linearGradient id="z-capsule-b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e5e0d8"/>
      <stop offset="100%" stop-color="#9a9488"/>
    </linearGradient>
    <linearGradient id="z-tablet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e55050"/>
      <stop offset="100%" stop-color="#8a1818"/>
    </linearGradient>
    <linearGradient id="z-packet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8cfc0"/>
      <stop offset="100%" stop-color="#8a8070"/>
    </linearGradient>
    <linearGradient id="z-syringe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9fd4e0"/>
      <stop offset="100%" stop-color="#4a7a88"/>
    </linearGradient>
    <radialGradient id="z-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8d8a"/>
      <stop offset="70%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#7b1010"/>
    </radialGradient>
    <filter id="z-blur"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="z-glow-f"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <circle cx="160" cy="160" r="140" fill="url(#z-glow-bg)" filter="url(#z-blur)"/>

  <!-- Connecting lines from center to each substance group -->
  <line x1="160" y1="160" x2="228" y2="96" stroke="#e53935" stroke-width="1" stroke-opacity="0.28" stroke-dasharray="3 4"/>
  <line x1="160" y1="160" x2="236" y2="224" stroke="#e53935" stroke-width="1" stroke-opacity="0.28" stroke-dasharray="3 4"/>
  <line x1="160" y1="160" x2="88" y2="228" stroke="#e53935" stroke-width="1" stroke-opacity="0.28" stroke-dasharray="3 4"/>
  <line x1="160" y1="160" x2="82" y2="94" stroke="#e53935" stroke-width="1" stroke-opacity="0.28" stroke-dasharray="3 4"/>

  <!-- Central molecular / warning core -->
  <circle cx="160" cy="160" r="30" fill="url(#z-core)" filter="url(#z-glow-f)"/>
  <circle cx="160" cy="160" r="42" stroke="#e53935" stroke-width="1" fill="none" stroke-opacity="0.5">
    <animate attributeName="r" values="40;54;40" dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.5;0;0.5" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <!-- Hexagon ring motif = chemical structure -->
  <path d="M160 138 L179 149 L179 171 L160 182 L141 171 L141 149 Z"
        fill="none" stroke="#ffd7d6" stroke-width="1.6" stroke-opacity="0.8"/>
  <circle cx="160" cy="138" r="2" fill="#ffd7d6"/>
  <circle cx="179" cy="149" r="2" fill="#ffd7d6"/>
  <circle cx="179" cy="171" r="2" fill="#ffd7d6"/>
  <circle cx="160" cy="182" r="2" fill="#ffd7d6"/>
  <circle cx="141" cy="171" r="2" fill="#ffd7d6"/>
  <circle cx="141" cy="149" r="2" fill="#ffd7d6"/>

  <!-- === Capsule (top-left) — opioid / obat golongan resep === -->
  <g transform="translate(56,70) rotate(-18)" filter="url(#z-glow-f)">
    <rect x="0" y="0" width="52" height="22" rx="11" fill="url(#z-capsule-b)" stroke="#3a3630" stroke-width="1.2"/>
    <path d="M26 0 A11 11 0 0 1 26 22 Z" fill="url(#z-capsule-a)"/>
  </g>

  <!-- === Tablets cluster (top-right) — stimulan/pil === -->
  <g transform="translate(226,72)" filter="url(#z-glow-f)">
    <circle cx="0" cy="10" r="15" fill="url(#z-tablet)" stroke="#4a0808" stroke-width="1.4"/>
    <line x1="-9" y1="10" x2="9" y2="10" stroke="#ffb3b0" stroke-width="1.2" stroke-opacity="0.7"/>
    <circle cx="20" cy="-6" r="10" fill="url(#z-tablet)" stroke="#4a0808" stroke-width="1.2" opacity="0.9"/>
    <line x1="14" y1="-6" x2="26" y2="-6" stroke="#ffb3b0" stroke-width="1" stroke-opacity="0.6"/>
  </g>

  <!-- === Powder packet (bottom-right) — kokain/sabu === -->
  <g transform="translate(210,206)" filter="url(#z-glow-f)">
    <path d="M0 0 L44 0 L38 38 L6 38 Z" fill="url(#z-packet)" stroke="#3a352c" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M4 0 L0 -12 L44 -12 L40 0" fill="none" stroke="#8a8070" stroke-width="1.4" stroke-linejoin="round"/>
    <circle cx="22" cy="18" r="3" fill="#fff" opacity="0.5"/>
    <circle cx="16" cy="26" r="2" fill="#fff" opacity="0.4"/>
    <circle cx="28" cy="27" r="2.2" fill="#fff" opacity="0.4"/>
  </g>

  <!-- === Syringe (bottom-left) — zat suntik === -->
  <g transform="translate(46,214) rotate(-22)" filter="url(#z-glow-f)">
    <rect x="0" y="0" width="48" height="15" rx="3" fill="url(#z-syringe)" stroke="#28444c" stroke-width="1.2"/>
    <rect x="8" y="3" width="26" height="9" fill="#ffffff" opacity="0.25"/>
    <rect x="-10" y="4" width="10" height="7" fill="#4a7a88"/>
    <line x1="48" y1="7.5" x2="60" y2="7.5" stroke="#9fd4e0" stroke-width="1.4" stroke-opacity="0.6"/>
    <rect x="16" y="-7" width="4" height="7" fill="#9fd4e0" opacity="0.6"/>
    <rect x="26" y="-7" width="4" height="7" fill="#9fd4e0" opacity="0.6"/>
  </g>

  <!-- Warning triangle badge, bottom center -->
  <g transform="translate(160,268)" opacity="0.85">
    <path d="M0 -14 L13 10 L-13 10 Z" fill="none" stroke="#f6a623" stroke-width="2" stroke-linejoin="round"/>
    <line x1="0" y1="-6" x2="0" y2="2" stroke="#f6a623" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="6.5" r="1.4" fill="#f6a623"/>
  </g>
</svg>
