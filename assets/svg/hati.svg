<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none">
  <defs>
    <radialGradient id="h-glow-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e08a3a" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#e08a3a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="h-liver-main" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#b5603a"/>
      <stop offset="55%" stop-color="#823a22"/>
      <stop offset="100%" stop-color="#4a1c10"/>
    </linearGradient>
    <linearGradient id="h-liver-shade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c2818"/>
      <stop offset="100%" stop-color="#2e120a"/>
    </linearGradient>
    <radialGradient id="h-toxin" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff8d8a"/>
      <stop offset="100%" stop-color="#c62828"/>
    </radialGradient>
    <radialGradient id="h-safe-frag" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#7fe8c8"/>
      <stop offset="100%" stop-color="#2dd4a0"/>
    </radialGradient>
    <filter id="h-blur"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="h-glow-f"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <circle cx="160" cy="164" r="140" fill="url(#h-glow-bg)" filter="url(#h-blur)"/>

  <!-- === LIVER SILHOUETTE (large right lobe + smaller left lobe + gallbladder) === -->
  <path d="M64 128 C60 100 82 76 116 70 C142 65 160 74 172 88
           C186 78 210 74 232 84 C258 96 272 122 268 150
           C266 168 256 182 256 200 C256 222 240 240 214 246
           C188 252 160 250 134 246 C104 241 78 228 68 204
           C58 180 60 152 64 128 Z"
        fill="url(#h-liver-main)" stroke="#2e120a" stroke-width="2"/>

  <!-- Lobe division shading -->
  <path d="M172 88 C178 118 180 150 172 180 C166 202 152 220 134 232"
        fill="none" stroke="#2e120a" stroke-width="2.5" stroke-opacity="0.45" stroke-linecap="round"/>

  <!-- Under-shading for depth -->
  <path d="M68 204 C78 228 104 241 134 246 C160 250 188 252 214 246 C232 242 246 232 252 218
           C232 232 200 236 170 232 C136 228 104 220 84 200 C78 194 72 198 68 204 Z"
        fill="url(#h-liver-shade)" opacity="0.7"/>

  <!-- Gallbladder -->
  <path d="M198 214 C198 202 208 196 216 200 C224 204 226 216 220 226 C214 236 200 234 198 224 Z"
        fill="#3a6b2a" stroke="#1e4018" stroke-width="1.4" opacity="0.85"/>

  <!-- Surface highlight -->
  <ellipse cx="108" cy="104" rx="30" ry="16" fill="#fff" opacity="0.06" transform="rotate(-18,108,104)"/>

  <!-- === CYP450 enzyme activity: toxin molecules approaching + breaking apart === -->
  <!-- Incoming toxin molecule (top right) -->
  <g transform="translate(250,60)" filter="url(#h-glow-f)">
    <circle cx="0" cy="0" r="7" fill="url(#h-toxin)"/>
    <circle cx="12" cy="6" r="4.5" fill="url(#h-toxin)" opacity="0.85"/>
    <line x1="0" y1="0" x2="12" y2="6" stroke="#ff8d8a" stroke-width="1.4" opacity="0.6"/>
    <animateTransform attributeName="transform" type="translate" values="250,60;206,96;198,104" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0" dur="2.6s" repeatCount="indefinite"/>
  </g>

  <!-- Broken-down fragments drifting away, harmless -->
  <circle cx="150" cy="60" r="3" fill="url(#h-safe-frag)" opacity="0.8">
    <animateTransform attributeName="transform" type="translate" values="0,0;-14,-18;-22,-30" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.5;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="164" cy="54" r="2.4" fill="url(#h-safe-frag)" opacity="0.7">
    <animateTransform attributeName="transform" type="translate" values="0,0;10,-20;16,-32" dur="3.3s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.4;0" dur="3.3s" begin="0.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Enzyme "spark" markers on liver surface, representing CYP450 activity sites -->
  <g opacity="0.85">
    <path d="M130 110 l4 -8 l4 8 l-4 -2 z" fill="#ffd7d6"/>
    <path d="M188 140 l4 -8 l4 8 l-4 -2 z" fill="#ffd7d6"/>
    <path d="M150 172 l4 -8 l4 8 l-4 -2 z" fill="#ffd7d6"/>
  </g>

  <!-- Pulsing ring emphasising metabolic activity -->
  <circle cx="164" cy="160" r="96" stroke="#f6a623" stroke-width="1" fill="none" stroke-opacity="0.35">
    <animate attributeName="r" values="92;108;92" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.35;0;0.35" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
