<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Pill capsule -->
  <g transform="translate(58,72) rotate(-28)">
    <rect x="0" y="0" width="46" height="20" rx="10" fill="rgba(230,180,90,0.28)" stroke="rgba(230,180,90,0.55)" stroke-width="2"/>
    <path d="M23 0 L23 20" stroke="rgba(230,180,90,0.55)" stroke-width="1.4"/>
    <rect x="0" y="0" width="23" height="20" rx="10" fill="rgba(200,190,170,0.22)" stroke="rgba(200,190,170,0.5)" stroke-width="2"/>
  </g>
  <!-- Small packet / powder sachet -->
  <path d="M108 118 L146 118 L140 150 L114 150 Z"
        fill="rgba(200,190,170,0.18)" stroke="rgba(200,190,170,0.5)" stroke-width="2" stroke-linejoin="round"/>
  <path d="M112 118 L108 108 L146 108 L142 118" fill="none" stroke="rgba(200,190,170,0.45)" stroke-width="2" stroke-linejoin="round"/>
  <line x1="118" y1="126" x2="136" y2="126" stroke="rgba(230,180,90,0.4)" stroke-width="2"/>
  <line x1="116" y1="134" x2="134" y2="134" stroke="rgba(230,180,90,0.35)" stroke-width="2"/>

  <!-- Syringe (simplified, needle understated) -->
  <g transform="translate(96,50) rotate(24)">
    <rect x="0" y="0" width="42" height="14" rx="3" fill="rgba(180,200,210,0.2)" stroke="rgba(180,200,210,0.5)" stroke-width="2"/>
    <rect x="6" y="3" width="26" height="8" fill="rgba(180,200,210,0.28)"/>
    <rect x="-9" y="4" width="9" height="6" fill="rgba(180,200,210,0.4)"/>
    <line x1="42" y1="7" x2="54" y2="7" stroke="rgba(180,200,210,0.4)" stroke-width="1.6"/>
    <rect x="15" y="-6" width="4" height="6" fill="rgba(180,200,210,0.35)"/>
    <rect x="23" y="-6" width="4" height="6" fill="rgba(180,200,210,0.35)"/>
  </g>

  <!-- Red prohibition overlay -->
  <circle cx="100" cy="100" r="72" stroke="#e03535" stroke-width="4" fill="rgba(224,53,53,0.06)"/>
  <line x1="50" y1="50" x2="150" y2="150" stroke="#e03535" stroke-width="5" stroke-linecap="round"/>
  <line x1="150" y1="50" x2="50" y2="150" stroke="#e03535" stroke-width="5" stroke-linecap="round"/>
</svg>
